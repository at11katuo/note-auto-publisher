name: Check Logs

on:
  workflow_dispatch:

jobs:
  logs:
    name: Fetch VPS Logs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch logs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=============================="
            echo "=== CONTAINER STATUS       ==="
            echo "=============================="
            docker compose ps

            echo ""
            echo "=============================="
            echo "=== DB FILE (publisher)    ==="
            echo "=============================="
            docker compose exec -T publisher ls -lah /app/data/ 2>/dev/null || echo "[publisher not running]"

            echo ""
            echo "=============================="
            echo "=== DB FILE (dashboard)    ==="
            echo "=============================="
            docker compose exec -T dashboard ls -lah /app/data/ 2>/dev/null || echo "[dashboard not running]"

            echo ""
            echo "=============================="
            echo "=== DRAFT STATUS IN DB     ==="
            echo "=============================="
            docker compose exec -T publisher node --input-type=module << 'EOF'
            import { createRequire } from 'module';
            const require = createRequire(import.meta.url);
            process.env.DATABASE_URL = 'file:/app/data/prod.db';
            const { PrismaClient } = require('@prisma/client');
            const p = new PrismaClient({ datasources: { db: { url: 'file:/app/data/prod.db' } } });
            const counts = await p.draft.groupBy({ by: ['status'], _count: { _all: true } });
            console.log('Draft counts by status:', JSON.stringify(counts));
            const publishing = await p.draft.findMany({ where: { status: 'publishing' }, select: { id: true, title: true, generatedAt: true } });
            console.log('Publishing drafts:', JSON.stringify(publishing));
            await p.$disconnect();
            EOF
            echo "[DB query done]"

            echo ""
            echo "=============================="
            echo "=== PUBLISHER LOGS (100)   ==="
            echo "=============================="
            docker compose logs --tail=100 publisher

            echo ""
            echo "=============================="
            echo "=== DASHBOARD LOGS (50)    ==="
            echo "=============================="
            docker compose logs --tail=50 dashboard

            echo ""
            echo "=============================="
            echo "=== GENERATOR LOGS (30)    ==="
            echo "=============================="
            docker compose logs --tail=30 generator
