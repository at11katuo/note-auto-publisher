name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> stop and remove existing containers"
            # 一度すべて止めて、きれいに掃除します
            docker compose down

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions (Final Fix)"
            # データベースフォルダをアプリ(1001)が自由に使えるようにします
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> launch services (excluding publisher)"
            # 暴走の元凶である publisher は一旦起動させません
            docker compose up -d dashboard collector generator caddy

            echo "==> wait for Next.js startup"
            sleep 20

            echo "--- DASHBOARD LOGS (startup) ---"
            docker compose ps
            docker compose logs --tail=100 dashboard

            echo "==> trigger request (collector → dashboard:3000 via Node.js HTTP)"
            docker compose exec -T collector node -e "const h=require('http');h.get('http://dashboard:3000',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{process.stdout.write('STATUS:'+r.statusCode+'\n'+d.slice(0,4000)+'\n');process.exit(0);});}).on('error',(e)=>{process.stderr.write('REQUEST_ERROR:'+e.message+'\n');process.exit(0);});" 2>&1 || true

            sleep 3
            echo "--- DASHBOARD LOGS (post-request) ---"
            docker compose logs --tail=300 dashboard

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"