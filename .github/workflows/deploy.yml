name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> write .env from GitHub Secrets"
            cat > .env <<'ENVEOF'
            DATABASE_URL=file:/app/data/prod.db
            NODE_ENV=production
            LOG_LEVEL=info
            ENVEOF
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
            echo "NOTE_EMAIL=${{ secrets.NOTE_EMAIL }}" >> .env
            echo "NOTE_PASSWORD=${{ secrets.NOTE_PASSWORD }}" >> .env
            echo "DASHBOARD_BASIC_USER=${{ secrets.DASHBOARD_BASIC_USER }}" >> .env
            echo "DASHBOARD_BASIC_PASS=${{ secrets.DASHBOARD_BASIC_PASS }}" >> .env
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
            echo "X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}" >> .env
            echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env

            echo "==> docker compose build (with layer cache)"
            DOCKER_BUILDKIT=1 docker compose build

            echo "==> stop existing containers"
            docker compose down

            echo "==> remove stale one-off containers"
            docker rm -f note-auto-publisher-migrate-1 2>/dev/null || true

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions"
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> launch all services"
            docker compose up -d

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> health check — dashboard (retry up to 60s)"
            ATTEMPTS=0
            until HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                    --max-time 10 \
                    -u "${{ secrets.DASHBOARD_BASIC_USER }}:${{ secrets.DASHBOARD_BASIC_PASS }}" \
                    "http://localhost:3000") \
                  && [ "$HTTP_STATUS" = "200" ]; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ "$ATTEMPTS" -ge 12 ]; then
                echo "ERROR: dashboard did not return 200 after ${ATTEMPTS} attempts (last: HTTP $HTTP_STATUS)" >&2
                docker compose logs --tail=40 dashboard >&2
                exit 1
              fi
              echo "  waiting... (attempt $ATTEMPTS, HTTP $HTTP_STATUS)"
              sleep 5
            done
            echo "==> dashboard OK (HTTP $HTTP_STATUS, attempts: $ATTEMPTS)"

            echo "==> deploy complete"

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **Deploy succeeded** — \`$(echo '${{ github.sha }}' | cut -c1-7)\` by ${{ github.actor }}\"}"

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **Deploy FAILED** — \`$(echo '${{ github.sha }}' | cut -c1-7)\` by ${{ github.actor }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>\"}"
