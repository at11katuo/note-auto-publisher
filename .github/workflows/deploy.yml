name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> stop and remove existing containers"
            docker compose down

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==ly fix database permissions"
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> launch services (including background publisher)"
            # すべてのサービス（常駐ワーカー含む）を起動します
            docker compose up -d

            echo "==> run note login setup (First time only)"
            # 初回限定で、noteへのログインセッションをサーバーに記憶させます
            docker compose run --rm publisher pnpm --filter @note/publisher start -- --login-only

            echo "==> wait for stability"
            sleep 5

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"