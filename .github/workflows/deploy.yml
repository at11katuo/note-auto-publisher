name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions"
            # データベースとデータフォルダの所有権をアプリ実行ユーザー(1001)に強制変更
            docker compose run --rm --user root migrate chown -R 1001:1001 /app/data

            echo "==> launch services"
            docker compose up -d

            echo "==> wait for stability & check logs"
            # アプリが起動してエラーを吐くのを少し待つ
            sleep 5

            echo "--- DASHBOARD ERROR LOG START ---"
            docker compose logs --tail=100 dashboard
            echo "--- DASHBOARD ERROR LOG END ---"

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"