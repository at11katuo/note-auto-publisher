name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions (Strong Mode)"
            # データベースフォルダ全体の権限を全開放し、アプリが確実に読み書きできるようにします
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> launch services"
            docker compose up -d

            echo "==> wait for stability (10s)"
            sleep 10

            echo "--- ALL SERVICES STATUS ---"
            docker compose ps

            echo "--- DASHBOARD LATEST LOGS ---"
            # 500エラーの真犯人を探すためのログ
            docker compose logs --tail=200 dashboard

            echo "--- PUBLISHER LOGS (Check restarting) ---"
            # 再起動を繰り返していた投稿担当のログ
            docker compose logs --tail=50 publisher

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"