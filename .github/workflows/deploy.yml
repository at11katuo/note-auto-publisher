name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> clear stale note session"
            sudo rm -rf apps/publisher/.auth/note.json 2>/dev/null || true
            sudo rm -rf .auth/note.json 2>/dev/null || true
            sudo rm -rf /var/lib/docker/volumes/note-auto-publisher_auth_state/_data/note.json 2>/dev/null || true

            echo "==> write .env from GitHub Secrets"
            printf 'DATABASE_URL=file:/app/data/prod.db\nNODE_ENV=production\nLOG_LEVEL=info\n' > .env
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
            echo "NOTE_EMAIL=${{ secrets.NOTE_EMAIL }}" >> .env
            echo "NOTE_PASSWORD=${{ secrets.NOTE_PASSWORD }}" >> .env
            echo "DASHBOARD_BASIC_USER=${{ secrets.DASHBOARD_BASIC_USER }}" >> .env
            echo "DASHBOARD_BASIC_PASS=${{ secrets.DASHBOARD_BASIC_PASS }}" >> .env
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
            echo "X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}" >> .env

            echo "==> docker compose build"
            docker compose build

            echo "==> stop and remove existing containers"
            docker compose down

            echo "==> remove stale one-off containers"
            docker rm -f note-auto-publisher-migrate-1 2>/dev/null || true

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions"
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> clear stale session to force clean login"
            docker compose run --rm publisher rm -rf /app/apps/publisher/.auth/note.json 2>/dev/null || true

            echo "==> launch services (including background publisher)"
            docker compose up -d

            echo "==> note login (stored session を再利用、無ければ自動ログイン)"
            docker compose run --rm -e NOTE_EMAIL="${{ secrets.NOTE_EMAIL }}" -e NOTE_PASSWORD="${{ secrets.NOTE_PASSWORD }}" publisher pnpm --filter @note/publisher login || true

            echo "==> wait for stability"
            sleep 5

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"
