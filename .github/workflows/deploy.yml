name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions"
            docker compose run --rm --user root migrate chmod -R 777 /app/data

            echo "==> launch services (without publisher for now)"
            # 暴走している publisher を一旦止めるため、個別に起動します
            docker compose up -d dashboard collector generator caddy

            echo "==> stop and disable crashing publisher"
            docker compose stop publisher || true

            echo "==> wait for dashboard to stabilize"
            sleep 10

            echo "--- DASHBOARD STATUS & LOGS ---"
            docker compose ps
            docker compose logs --tail=50 dashboard

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"