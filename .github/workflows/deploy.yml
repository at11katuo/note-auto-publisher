name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> git pull"
            git pull origin main

            echo "==> docker compose build"
            docker compose build

            echo "==> run database migration"
            docker compose up --exit-code-from migrate migrate

            echo "==> fix database permissions"
            # データベースファイルの所有者を、アプリが動くユーザー(1001)に変更します
            docker compose run --rm --user root migrate chown -R 1001:1001 /app/data

            echo "==> launch services"
            docker compose up -d

            echo "==> restart caddy"
            docker compose restart caddy

            echo "==> deploy complete"